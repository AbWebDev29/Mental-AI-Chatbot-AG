<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirra AI — Chat</title>
  <link rel="stylesheet" href="styles/global.css">
  <style>
    body { overflow: hidden; }
    .chat-layout { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    .chat-main { flex:1; display:flex; gap:0; overflow:hidden; padding:0; }
    .chat-sidebar { width:260px; padding:20px 16px; display:flex; flex-direction:column; gap:12px; background:rgba(255,255,255,0.3); backdrop-filter:blur(14px); border-right:1px solid rgba(255,255,255,0.6); overflow-y:auto; }
    .sidebar-title { font-size:0.75rem; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:1.2px; padding:0 4px; }
    .new-chat-btn { display:flex; align-items:center; gap:8px; padding:12px 16px; border-radius:var(--radius-lg); background:linear-gradient(135deg,rgba(249,168,212,0.4),rgba(192,132,252,0.3)); border:1.5px solid rgba(255,255,255,0.75); cursor:pointer; font-family:var(--font); font-size:0.88rem; font-weight:600; color:var(--text-dark); transition:all 0.22s ease; }
    .new-chat-btn:hover { background:linear-gradient(135deg,rgba(249,168,212,0.6),rgba(192,132,252,0.5)); transform:translateX(3px); }
    .session-item { padding:10px 14px; border-radius:14px; font-size:0.82rem; color:var(--text-mid); cursor:pointer; transition:all 0.2s ease; border:1px solid transparent; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .session-item:hover, .session-item.active { background:rgba(255,255,255,0.5); border-color:rgba(255,255,255,0.75); color:var(--text-dark); }
    .session-date { font-size:0.68rem; color:var(--text-light); padding:4px 14px; margin-top:4px; }
    .sidebar-empty { font-size:0.8rem; color:var(--text-light); text-align:center; padding:20px 10px; line-height:1.6; }
    .chat-window { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .chat-header { padding:16px 28px; display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.28); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.5); }
    .chat-header-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#fce7f3,#ede9fe); border:2px solid rgba(255,255,255,0.8); display:flex; align-items:center; justify-content:center; font-size:22px; }
    .chat-header-info h3 { font-size:0.95rem; font-weight:600; color:var(--text-dark); }
    .chat-header-info p { font-size:0.75rem; color:var(--text-light); display:flex; align-items:center; gap:5px; }
    .status-dot { width:7px; height:7px; border-radius:50%; background:#86efac; display:inline-block; }
    .messages-area { flex:1; overflow-y:auto; padding:28px 28px 12px; display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth; }
    .messages-area::-webkit-scrollbar { width:4px; }
    .messages-area::-webkit-scrollbar-thumb { background:rgba(192,132,252,0.3); border-radius:4px; }
    .message { display:flex; gap:10px; align-items:flex-end; animation:msgIn 0.35s cubic-bezier(0.34,1.2,0.64,1) both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(12px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    .message.user { flex-direction:row-reverse; }
    .msg-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#fce7f3,#ede9fe); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; border:1.5px solid rgba(255,255,255,0.8); }
    .msg-bubble { max-width:62%; padding:14px 18px; border-radius:20px; font-size:0.9rem; line-height:1.65; box-shadow:0 4px 16px rgba(180,120,160,0.13); }
    .message.ai .msg-bubble { background:rgba(255,255,255,0.6); backdrop-filter:blur(12px); border:1.5px solid rgba(255,255,255,0.75); border-bottom-left-radius:6px; color:var(--text-dark); }
    .message.user .msg-bubble { background:linear-gradient(135deg,#fce7f3,#fbcfe8); border:1.5px solid rgba(249,168,212,0.5); border-bottom-right-radius:6px; color:var(--text-dark); }
    .msg-time { font-size:0.68rem; color:var(--text-light); margin-top:5px; text-align:right; }
    .message.ai .msg-time { text-align:left; }
    .typing-indicator { display:flex; gap:5px; padding:14px 18px; background:rgba(255,255,255,0.6); backdrop-filter:blur(12px); border:1.5px solid rgba(255,255,255,0.75); border-radius:20px; border-bottom-left-radius:6px; max-width:80px; }
    .typing-indicator span { width:8px; height:8px; border-radius:50%; background:var(--lavender); animation:typingBounce 1.2s ease-in-out infinite; }
    .typing-indicator span:nth-child(2){animation-delay:0.2s} .typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.5} 30%{transform:translateY(-6px);opacity:1} }
    .chat-input-bar { padding:16px 28px 20px; background:rgba(255,255,255,0.28); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.5); }
    .input-row { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.5); border:1.5px solid rgba(255,255,255,0.8); border-radius:var(--radius-pill); padding:8px 8px 8px 20px; box-shadow:0 4px 20px rgba(180,120,160,0.12); transition:box-shadow 0.3s ease,border-color 0.3s ease; }
    .input-row:focus-within { border-color:rgba(192,132,252,0.5); box-shadow:0 0 0 3px rgba(192,132,252,0.18),0 4px 20px rgba(180,120,160,0.15); }
    #chatInput { flex:1; border:none; background:transparent; font-family:var(--font); font-size:0.93rem; color:var(--text-dark); outline:none; resize:none; max-height:120px; }
    #chatInput::placeholder { color:var(--text-light); }
    .send-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#f9a8d4,#c084fc); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(192,132,252,0.4); transition:transform 0.2s ease,box-shadow 0.2s ease; flex-shrink:0; }
    .send-btn:hover { transform:scale(1.1); box-shadow:0 6px 18px rgba(192,132,252,0.5); }
    .send-btn svg { width:18px; height:18px; fill:#fff; }
    .input-hint { text-align:center; font-size:0.7rem; color:var(--text-light); margin-top:8px; }
    @media(max-width:768px){.chat-sidebar{display:none}}
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="page-wrapper chat-layout">
    <nav class="navbar">
      <a href="index.html" class="navbar-logo">
        <div class="logo-circle">🌸</div>
        <div class="logo-text"><span>Mirra</span> AI</div>
      </a>
      <ul class="navbar-links">
        <li><a href="support.html">Support</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="signin.html">Sign In</a></li>
      </ul>
      <div class="navbar-profile">👤</div>
    </nav>

    <div class="chat-main">
      <aside class="chat-sidebar">
        <span class="sidebar-title">Conversations</span>
        <button class="new-chat-btn" onclick="newChat()">✦ New Chat</button>
        <div id="sessionsList"></div>
      </aside>

      <div class="chat-window">
        <div class="chat-header">
          <div class="chat-header-avatar">🌸</div>
          <div class="chat-header-info">
            <h3>Mirra AI</h3>
            <p><span class="status-dot"></span> Online · Always here for you</p>
          </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-bar">
          <div class="input-row">
            <textarea id="chatInput" rows="1" placeholder="Share what's on your mind..." onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()" title="Send">
              <svg viewBox="0 0 24 24"><path d="M2 12L22 2L14 22L11 13L2 12Z"/></svg>
            </button>
          </div>
          <p class="input-hint">Press Enter to send · Shift+Enter for new line · This is a safe space 💜</p>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const API = 'http://127.0.0.1:8000';
    const chatDisplay = document.getElementById('messagesArea');
    const userId = localStorage.getItem('user_id');
    let currentSessionId = generateSessionId();

    function generateSessionId() {
      return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatSessionDate(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return `${diff} days ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function appendMessage(text, type) {
      const bubble = document.createElement('div');
      bubble.className = `message ${type}`;
      bubble.innerHTML = `
        <div class="msg-avatar" style="overflow:hidden;padding:0;">${(() => {
          if (type === 'ai') return '🌸';
          const av = localStorage.getItem('user_avatar');
          if (!av) return '👤';
          if (av.startsWith('http') || av.startsWith('data:image')) return '<img src="' + av + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">';
          return av;
        })()}</div>
        <div>
          <div class="msg-bubble">${text}</div>
          <div class="msg-time">${getTime()}</div>
        </div>
      `;
      chatDisplay.appendChild(bubble);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    function showTyping() {
      const indicator = document.createElement('div');
      indicator.className = 'message ai';
      indicator.id = 'typingIndicator';
      indicator.innerHTML = `<div class="msg-avatar">🌸</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
      chatDisplay.appendChild(indicator);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function loadSessions() {
      if (!userId) return;
      try {
        const res = await fetch(`${API}/sessions/${userId}`);
        const sessions = await res.json();
        const list = document.getElementById('sessionsList');
        list.innerHTML = '';

        if (!sessions.length) {
          list.innerHTML = '<div class="sidebar-empty">Your conversations will appear here 🌸</div>';
          return;
        }

let lastDate = null;
sessions.forEach(s => {
  const dateLabel = formatSessionDate(s.last_time);
  
  // Only show date header when it changes
  if (dateLabel !== lastDate) {
    const date = document.createElement('div');
    date.className = 'session-date';
    date.textContent = dateLabel;
    list.appendChild(date);
    lastDate = dateLabel;
  }

  const item = document.createElement('div');
  item.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
  item.textContent = s.first_message?.substring(0, 35) + (s.first_message?.length > 35 ? '...' : '');
  item.title = s.first_message;
  item.onclick = () => loadSession(s.session_id, item);
  list.appendChild(item);
});
      } catch(e) {
        console.log('Could not load sessions', e);
      }
    }

    async function loadSession(sessionId, el) {
      currentSessionId = sessionId;
      document.querySelectorAll('.session-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');

      chatDisplay.innerHTML = '';
      try {
        const res = await fetch(`${API}/session/${sessionId}`);
        const messages = await res.json();
        messages.forEach(m => {
          appendMessage(m.message, 'user');
          appendMessage(m.ai_reply, 'ai');
        });
      } catch(e) {
        appendMessage('Could not load this conversation.', 'ai');
      }
    }

    async function getMemoryContext() {
      try {
        const res = await fetch(`${API}/memory/${userId}`);
        const memory = await res.json();
        if (memory.total_sessions > 0) {
          return `You are a returning user. You've had ${memory.total_sessions} conversations. Your most common emotion has been "${memory.top_emotion}". Recent topics: ${memory.recent_topics?.join(', ')}.`;
        }
      } catch(e) {}
      return '';
    }

    async function showWelcome() {
      try {
        const userName = localStorage.getItem('user_name') || 'friend';
        const res = await fetch(`${API}/greeting/${userId}?name=${encodeURIComponent(userName)}`);
        const data = await res.json();
        appendMessage(data.greeting, 'ai');
      } catch(e) {
        appendMessage(`Hello 🌸 I'm your Mirra AI companion. I'm here to listen and support you. What's on your mind today?`, 'ai');
      }
    }

    async function processChatMessage(message) {
      appendMessage(message, 'user');
      showTyping();

      try {
        const anonMode = localStorage.getItem(`anon_mode_${userId}`) === "true";
      const effectiveUserId = anonMode ? "anonymous" : userId;
      const res = await fetch(`${API}/chat?user_id=${encodeURIComponent(effectiveUserId)}&message=${encodeURIComponent(message)}&session_id=${encodeURIComponent(currentSessionId)}`, { method: 'POST' });
        const data = await res.json();
        removeTyping();

        if (!res.ok) {
          appendMessage('Sorry, something went wrong. Please try again.', 'ai');
          return;
        }

        appendMessage(data.reply || 'I am here to listen.', 'ai');
        loadSessions(); // refresh sidebar
      } catch (err) {
        removeTyping();
        appendMessage('Network error. Please check your server connection.', 'ai');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      await processChatMessage(text);
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
      const ta = document.getElementById('chatInput');
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    }

    function newChat() {
      currentSessionId = generateSessionId();
      chatDisplay.innerHTML = '';
      document.querySelectorAll('.session-item').forEach(i => i.classList.remove('active'));
      showWelcome();
    }

    window.onload = async () => {
      if (!userId) {
        window.location.href = 'signin.html';
        return;
      }

      await loadSessions();
      await showWelcome();

      const urlParams = new URLSearchParams(window.location.search);
      const moodFromLanding = urlParams.get('initialMood');
      if (moodFromLanding) {
        await processChatMessage(moodFromLanding);
      }
    };
  </script>
</body>
</html>
