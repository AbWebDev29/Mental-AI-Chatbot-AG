<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Garden</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@200;300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fdf6ec;
            --panel: #fff8f0;
            --border: #e8d9c4;
            --text: #3d2e1e;
            --text-soft: #8a7060;
            --text-dim: #bfac98;
            --accent: #6b9e5e;
            --accent2: #c9844a;
            --accent3: #7a9fc2;
            --sky1: #e8f4f0;
            --sky2: #f5ede0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow: hidden;
            user-select: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--text);
            white-space: nowrap;
        }

        .logo span {
            color: var(--accent);
            font-style: italic;
        }

        .canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .bottombar {
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 10px 14px 12px;
            flex-shrink: 0;
        }

        .tool-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .tool-row::-webkit-scrollbar {
            height: 3px;
        }

        .tool-row::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        .tool-row+.tool-row {
            margin-top: 8px;
        }

        .section-label {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 36px;
        }

        .stamp-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1.5px solid transparent;
            background: var(--bg);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .stamp-btn:hover {
            border-color: var(--accent);
            background: #f0f7ee;
        }

        .stamp-btn.active {
            border-color: var(--accent);
            background: #e6f2e3;
            box-shadow: 0 0 0 3px rgba(107, 158, 94, 0.15);
        }

        .swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s, border-color 0.15s;
            outline: none;
        }

        .swatch:hover {
            transform: scale(1.15);
        }

        .swatch.active {
            border-color: var(--text);
            transform: scale(1.15);
        }

        .size-slider {
            flex: 1;
            min-width: 80px;
            max-width: 140px;
            accent-color: var(--accent);
            cursor: pointer;
            height: 3px;
        }

        .action-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-soft);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .action-btn:hover {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .action-btn.danger:hover {
            border-color: #e05252;
            color: #e05252;
        }

        .action-btn.save-btn {
            border-color: var(--accent);
            color: var(--accent);
        }

        .action-btn.save-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .mode-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-soft);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .mode-btn.active {
            background: var(--bg);
            border-color: var(--text-soft);
            color: var(--text);
        }

        .size-preview {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .size-dot {
            border-radius: 50%;
            background: var(--text-soft);
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--text);
            color: #fff;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 8px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .cursor-dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            border: 1.5px solid rgba(0, 0, 0, 0.25);
            transform: translate(-50%, -50%);
            z-index: 5;
            transition: width 0.1s, height 0.1s;
            display: none;
        }
    </style>
</head>

<body>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="toast" id="toast"></div>
    <div class="app">
        <div class="topbar">
            <div class="logo">doodle <span>garden</span></div>
            <div style="display:flex;gap:6px;align-items:center;">
                <button class="action-btn" onclick="undo()">↩ undo</button>
                <button class="action-btn danger" onclick="clearCanvas()">✕ clear</button>
                <button class="action-btn save-btn" onclick="saveImage()">↓ save</button>
            </div>
        </div>
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="bottombar">
            <div class="tool-row">
                <span class="section-label">plant</span>
                <button class="stamp-btn active" data-stamp="🌸" onclick="selectStamp(this)">🌸</button>
                <button class="stamp-btn" data-stamp="🌻" onclick="selectStamp(this)">🌻</button>
                <button class="stamp-btn" data-stamp="🌷" onclick="selectStamp(this)">🌷</button>
                <button class="stamp-btn" data-stamp="🌿" onclick="selectStamp(this)">🌿</button>
                <button class="stamp-btn" data-stamp="🍀" onclick="selectStamp(this)">🍀</button>
                <button class="stamp-btn" data-stamp="🌵" onclick="selectStamp(this)">🌵</button>
                <button class="stamp-btn" data-stamp="🍄" onclick="selectStamp(this)">🍄</button>
                <button class="stamp-btn" data-stamp="🌾" onclick="selectStamp(this)">🌾</button>
                <button class="stamp-btn" data-stamp="🦋" onclick="selectStamp(this)">🦋</button>
                <button class="stamp-btn" data-stamp="🐝" onclick="selectStamp(this)">🐝</button>
                <button class="stamp-btn" data-stamp="⭐" onclick="selectStamp(this)">⭐</button>
                <button class="stamp-btn" data-stamp="☁️" onclick="selectStamp(this)">☁️</button>
                <div style="margin-left:4px;display:flex;gap:5px;">
                    <button class="mode-btn active" id="modeStamp" onclick="setMode('stamp')">stamp</button>
                    <button class="mode-btn" id="modeDraw" onclick="setMode('draw')">brush</button>
                    <button class="mode-btn" id="modeErase" onclick="setMode('erase')">eraser</button>
                </div>
            </div>
            <div class="tool-row" style="margin-top:8px;">
                <span class="section-label">color</span>
                <div class="swatch active" style="background:#6b9e5e;" onclick="selectColor('#6b9e5e',this)"></div>
                <div class="swatch" style="background:#c9844a;" onclick="selectColor('#c9844a',this)"></div>
                <div class="swatch" style="background:#d4697a;" onclick="selectColor('#d4697a',this)"></div>
                <div class="swatch" style="background:#7a9fc2;" onclick="selectColor('#7a9fc2',this)"></div>
                <div class="swatch" style="background:#b07cc6;" onclick="selectColor('#b07cc6',this)"></div>
                <div class="swatch" style="background:#e8c84a;" onclick="selectColor('#e8c84a',this)"></div>
                <div class="swatch" style="background:#4abba8;" onclick="selectColor('#4abba8',this)"></div>
                <div class="swatch" style="background:#e8956a;" onclick="selectColor('#e8956a',this)"></div>
                <div class="swatch" style="background:#3d2e1e;" onclick="selectColor('#3d2e1e',this)"></div>
                <div class="swatch" style="background:#ffffff;border:1.5px solid #e0d0c0;"
                    onclick="selectColor('#ffffff',this)"></div>
                <span class="section-label" style="margin-left:6px;">size</span>
                <div class="size-preview">
                    <div class="size-dot" id="sizeDot" style="width:8px;height:8px;"></div>
                </div>
                <input type="range" class="size-slider" id="sizeSlider" min="2" max="48" value="8"
                    oninput="updateSize(this.value)">
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wrap = canvas.parentElement;
        let mode = 'stamp', currentStamp = '🌸', currentColor = '#6b9e5e', brushSize = 8, drawing = false, lastX = 0, lastY = 0, history = [], maxHistory = 25;
        function resize() { canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; drawBackground(); }
        function drawBackground() {
            const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
            g.addColorStop(0, '#e8f5f0'); g.addColorStop(0.5, '#f5ede0'); g.addColorStop(1, '#eee8d8');
            ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d4e8c2'; ctx.fillRect(0, canvas.height * 0.82, canvas.width, canvas.height * 0.18);
            ctx.beginPath(); ctx.moveTo(0, canvas.height * 0.82); ctx.lineTo(canvas.width, canvas.height * 0.82); ctx.strokeStyle = '#b8d4a0'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width * 0.88, canvas.height * 0.12, 32, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,220,80,0.35)'; ctx.fill();
            ctx.beginPath(); ctx.arc(canvas.width * 0.88, canvas.height * 0.12, 22, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,210,60,0.55)'; ctx.fill();
            drawCloud(canvas.width * 0.15, canvas.height * 0.08, 0.9); drawCloud(canvas.width * 0.52, canvas.height * 0.06, 0.7);
        }
        function drawCloud(x, y, opacity) { ctx.save(); ctx.globalAlpha = opacity * 0.4; ctx.fillStyle = '#fff';[[0, 0, 28], [24, 4, 22], [-22, 5, 20], [44, 8, 18], [-40, 8, 16]].forEach(([dx, dy, r]) => { ctx.beginPath(); ctx.arc(x + dx, y + dy, r, 0, Math.PI * 2); ctx.fill(); }); ctx.restore(); }
        function saveHistory() { history.push(canvas.toDataURL()); if (history.length > maxHistory) history.shift(); }
        function undo() { if (!history.length) { showToast('nothing to undo'); return; } const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); }; img.src = history.pop(); }
        function clearCanvas() { saveHistory(); drawBackground(); showToast('garden cleared ✨'); }
        function saveImage() { const l = document.createElement('a'); l.download = 'my-doodle-garden.png'; l.href = canvas.toDataURL('image/png'); l.click(); showToast('garden saved! 🌸'); }
        function setMode(m) { mode = m; document.getElementById('modeStamp').classList.toggle('active', m === 'stamp'); document.getElementById('modeDraw').classList.toggle('active', m === 'draw'); document.getElementById('modeErase').classList.toggle('active', m === 'erase'); canvas.style.cursor = m === 'erase' ? 'cell' : m === 'draw' ? 'crosshair' : 'default'; }
        function selectStamp(el) { document.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); currentStamp = el.dataset.stamp; setMode('stamp'); }
        function selectColor(c, el) { currentColor = c; document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active')); el.classList.add('active'); }
        function updateSize(v) { brushSize = parseInt(v); const d = Math.max(4, Math.min(36, brushSize)); document.getElementById('sizeDot').style.width = d + 'px'; document.getElementById('sizeDot').style.height = d + 'px'; }
        function getPos(e) { const r = canvas.getBoundingClientRect(), scaleX = canvas.width / r.width, scaleY = canvas.height / r.height; if (e.touches) return [(e.touches[0].clientX - r.left) * scaleX, (e.touches[0].clientY - r.top) * scaleY]; return [(e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY]; }
        function placeStamp(x, y) { const size = brushSize * 3 + 12; ctx.save(); ctx.font = `${size}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; const angle = (Math.random() - 0.5) * 0.4; ctx.translate(x, y); ctx.rotate(angle); ctx.fillText(currentStamp, 0, 0); ctx.restore(); }
        function drawBrush(x, y, px, py) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.strokeStyle = currentColor; ctx.lineWidth = brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.globalAlpha = 0.82; ctx.stroke(); ctx.globalAlpha = 1; }
        function erase(x, y) { ctx.save(); ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(x, y, brushSize * 2, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,1)'; ctx.fill(); ctx.restore(); }
        canvas.addEventListener('mousedown', e => { saveHistory(); drawing = true; const [x, y] = getPos(e); lastX = x; lastY = y; if (mode === 'stamp') { placeStamp(x, y); drawing = false; } });
        canvas.addEventListener('mousemove', e => { const [x, y] = getPos(e); updateCursor(e.clientX, e.clientY); if (!drawing) return; if (mode === 'draw') drawBrush(x, y, lastX, lastY); else if (mode === 'erase') erase(x, y); lastX = x; lastY = y; });
        canvas.addEventListener('mouseup', () => drawing = false); canvas.addEventListener('mouseleave', () => { drawing = false; hideCursor(); }); canvas.addEventListener('mouseenter', () => showCursorDot());
        canvas.addEventListener('touchstart', e => { e.preventDefault(); saveHistory(); drawing = true; const [x, y] = getPos(e); lastX = x; lastY = y; if (mode === 'stamp') { placeStamp(x, y); drawing = false; } }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const [x, y] = getPos(e); if (mode === 'draw') drawBrush(x, y, lastX, lastY); else if (mode === 'erase') erase(x, y); lastX = x; lastY = y; }, { passive: false });
        canvas.addEventListener('touchend', () => drawing = false);
        const cursorDot = document.getElementById('cursorDot');
        function updateCursor(cx, cy) { cursorDot.style.display = 'block'; const sz = mode === 'erase' ? brushSize * 4 : brushSize + 6; cursorDot.style.width = sz + 'px'; cursorDot.style.height = sz + 'px'; cursorDot.style.left = cx + 'px'; cursorDot.style.top = cy + 'px'; cursorDot.style.background = mode === 'erase' ? 'rgba(255,100,100,0.08)' : hexToRgba(currentColor, 0.15); cursorDot.style.borderColor = mode === 'erase' ? 'rgba(220,80,80,0.4)' : hexToRgba(currentColor, 0.5); }
        function hideCursor() { cursorDot.style.display = 'none'; } function showCursorDot() { cursorDot.style.display = 'block'; }
        function hexToRgba(hex, a) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `rgba(${r},${g},${b},${a})`; }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2000); }
        window.addEventListener('resize', () => { const snap = canvas.toDataURL(); canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; drawBackground(); const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = snap; });
        canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; drawBackground();
        setTimeout(() => showToast('tap a stamp then tap the garden to plant 🌱'), 800);
    </script>
</body>

</html>
