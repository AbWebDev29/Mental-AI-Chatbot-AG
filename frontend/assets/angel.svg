  <text x="28" y="120" font-size="14" fill="#fcd34d" opacity="0.8">✦</text>
  <text x="178" y="108" font-size="10" fill="#c084fc" opacity="0.7">✦</text>
  <text x="60" y="68" font-size="9" fill="#f9a8d4" opacity="0.8">✦</text>
  <text x="155" y="72" font-size="12" fill="#fcd34d" opacity="0.6">✦</text>
  <!-- Dress details -->
  <ellipse cx="90" cy="250" rx="8" ry="5" fill="white" opacity="0.4"/>
  <ellipse cx="110" cy="260" rx="8" ry="5" fill="white" opacity="0.3"/>
  <ellipse cx="130" cy="252" rx="6" ry="4" fill="white" opacity="0.4"/>
