<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 300" fill="none">
  <!-- Halo -->
  <ellipse cx="110" cy="30" rx="38" ry="10" fill="none" stroke="#fcd34d" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <!-- Wings left -->
  <ellipse cx="58" cy="148" rx="55" ry="28" fill="#ede9fe" opacity="0.85" transform="rotate(-25 58 148)"/>
  <ellipse cx="52" cy="160" rx="42" ry="18" fill="#fce7f3" opacity="0.7" transform="rotate(-30 52 160)"/>
  <!-- Wings right -->
  <ellipse cx="162" cy="148" rx="55" ry="28" fill="#ede9fe" opacity="0.85" transform="rotate(25 162 148)"/>
  <ellipse cx="168" cy="160" rx="42" ry="18" fill="#fce7f3" opacity="0.7" transform="rotate(30 168 160)"/>
  <!-- Body / Dress -->
  <ellipse cx="110" cy="210" rx="46" ry="62" fill="#fce7f3"/>
