  <ellipse cx="78" cy="90" rx="14" ry="32" fill="#f9a8d4"/>
  <ellipse cx="142" cy="90" rx="14" ry="32" fill="#f9a8d4"/>
  <ellipse cx="110" cy="66" rx="30" ry="14" fill="#fbc4d6"/>
  <!-- Eyes -->
  <ellipse cx="96" cy="98" rx="7" ry="8" fill="#fff"/>
  <ellipse cx="124" cy="98" rx="7" ry="8" fill="#fff"/>
  <circle cx="97" cy="99" r="4" fill="#7c3aed"/>
  <circle cx="125" cy="99" r="4" fill="#7c3aed"/>
  <circle cx="98.5" cy="97" r="1.5" fill="#fff"/>
  <circle cx="126.5" cy="97" r="1.5" fill="#fff"/>
  <!-- Eyelashes -->
  <line x1="89" y1="91" x2="88" y2="87" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="89" x2="96" y2="85" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="103" y1="91" x2="104" y2="87" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="117" y1="91" x2="116" y2="87" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="124" y1="89" x2="124" y2="85" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="131" y1="91" x2="132" y2="87" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="85" cy="108" rx="10" ry="6" fill="#f9a8d4" opacity="0.45"/>
  <ellipse cx="135" cy="108" rx="10" ry="6" fill="#f9a8d4" opacity="0.45"/>
  <!-- Smile -->
  <path d="M100 114 Q110 122 120 114" stroke="#e879a0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
