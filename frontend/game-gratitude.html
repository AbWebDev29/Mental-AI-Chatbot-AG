<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#0a1628,#1a0a2e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;overflow-x:hidden}
.container{text-align:center;padding:40px 20px;max-width:480px;width:100%}
h1{font-size:1.8rem;margin-bottom:8px}
p{color:rgba(255,255,255,0.6);margin-bottom:30px;font-size:0.9rem;line-height:1.6}
.jar{font-size:5rem;margin:10px 0;animation:float 3s ease-in-out infinite;display:block}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
input{width:100%;padding:14px 20px;border-radius:50px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:inherit;font-size:0.9rem;margin-bottom:12px;outline:none;transition:border 0.3s}
input:focus{border-color:#f9a8d4}
input::placeholder{color:rgba(255,255,255,0.35)}
.btn{background:linear-gradient(135deg,#f9a8d4,#c084fc);color:white;border:none;border-radius:50px;padding:12px 32px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-bottom:30px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(249,168,212,0.4)}
.notes{display:flex;flex-direction:column;gap:10px;max-height:250px;overflow-y:auto}
.note{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:14px 18px;text-align:left;font-size:0.85rem;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:10px;animation:popIn 0.3s cubic-bezier(0.34,1.3,0.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.empty{color:rgba(255,255,255,0.3);font-size:0.85rem;margin-top:10px}
.count{color:#f9a8d4;font-size:0.8rem;margin-bottom:12px}
</style></head><body>
<div class="container">
  <span class="jar">🫙</span>
  <h1>Gratitude Jar ✨</h1>
  <p>Drop something you're grateful for into the jar. Watch your blessings fill up.</p>
  <div class="count" id="count">0 gratitudes collected</div>
  <input type="text" id="inp" placeholder="I'm grateful for..." maxlength="100" onkeydown="if(event.key==='Enter')add()">
  <button class="btn" onclick="add()">Drop it in 🌟</button>
  <div class="notes" id="notes"><div class="empty">Your jar is empty — add your first gratitude!</div></div>
</div>
<script>
let items = JSON.parse(localStorage.getItem('gratitude_jar') || '[]');
const emojis = ['🌸','💫','✨','🌟','💜','🌈','🍀','🌺','💝','⭐'];
function render() {
  const n = document.getElementById('notes');
  const c = document.getElementById('count');
  c.textContent = items.length + ' gratitude' + (items.length !== 1 ? 's' : '') + ' collected';
  if (!items.length) { n.innerHTML = '<div class="empty">Your jar is empty — add your first gratitude!</div>'; return; }
  n.innerHTML = [...items].reverse().map((t,i) => `<div class="note">${emojis[i%emojis.length]} ${t}</div>`).join('');
}
function add() {
  const inp = document.getElementById('inp');
  const val = inp.value.trim();
  if (!val) return;
  items.push(val);
  localStorage.setItem('gratitude_jar', JSON.stringify(items));
  inp.value = '';
  render();
}
render();
</script></body></html>
